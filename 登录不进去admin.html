<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言本后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei"}
body{background:#f6f7f9;padding:20px;max-width:1000px;margin:0 auto}
.login{max-width:400px;margin:100px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.login h2{margin-bottom:20px;color:#4f46e5}
.login input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px}
.login button{width:100%;padding:12px;background:#4f46e5;color:white;border:0;border-radius:8px;cursor:pointer}
.admin{display:none}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.search-box{padding:8px 12px;border:1px solid #ddd;border-radius:6px;width:260px}
.btn{padding:8px 12px;border-radius:6px;border:none;color:white;cursor:pointer;background:#6366f1}
.btn-red{background:#ef4444}
.btn-orange{background:#f97316}
.btn-green{background:#10b981}
.btn-gray{background:#64748b}
.stats{display:flex;gap:20px;margin-bottom:16px;color:#555}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:12px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card.top{border-left:4px solid #f97316}
.card input[type="checkbox"]{position:absolute;top:20px;right:20px}
.name{font-weight:bold;color:#4f46e5;margin-bottom:6px}
.time{font-size:12px;color:#888;margin-bottom:8px}
.content{line-height:1.6;margin-bottom:10px}
.reply-box{background:#f0fdf4;padding:10px;border-radius:6px;margin:10px 0;border-left:3px solid #16a34a}
.images{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.images img{width:100px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #eee}
.act{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pagination{display:flex;justify-content:center;gap:8px;margin:30px 0}
.pagination button{padding:6px 12px;border:1px solid #ddd;border-radius:6px;background:white;cursor:pointer}
.pagination button.active{background:#4f46e5;color:white}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:20px}
.modal .box{background:white;padding:24px;border-radius:12px;width:100%;max-width:500px}
.modal input, .modal textarea{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px}
.modal textarea{min-height:100px}
.label{margin-bottom:6px;font-size:14px;color:#444}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login" id="login">
  <h2>后台登录</h2>
  <input type="password" id="pwd" placeholder="请输入密码" autocomplete="new-password">
  <button onclick="doLogin()">登录</button>
</div>

<div class="admin" id="admin">
  <div class="header">
    <h1>留言管理</h1>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input class="search-box" id="kw" placeholder="搜索昵称/内容" oninput="load()">
      <button class="btn" onclick="toggleAll()">全选</button>
      <button class="btn btn-orange" onclick="batchDel()">批量删除</button>
      <button class="btn btn-gray" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="stats">
    <div>总条数：<span id="total">0</span></div>
    <div>已回复：<span id="hasReply">0</span></div>
    <div>置顶：<span id="topCount">0</span></div>
  </div>

  <div id="list"></div>
  <div class="pagination" id="page"></div>
</div>

<div class="modal" id="replyModal">
  <div class="box">
    <h3>回复留言</h3>
    <input type="hidden" id="reply_id">
    <div class="label">回复内容</div>
    <textarea id="reply_content"></textarea>
    <button class="btn" onclick="saveReply()">保存</button>
  </div>
</div>

<script>
const supabase = supabase.createClient(
  "https://eljzfbawdcfzufzehrtp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsanpmYmF3ZGNmenVmemVocnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzUxNzQsImV4cCI6MjA5MDUxMTE3NH0.s4U7BJsscobR731mX-2lhp-A3riz65o6lTgn7XtCARI"
);

// 固定密码，不存任何缓存
const ADMIN_PWD = "xyzvip";
let page = 1;
const limit = 15;
let keyword = "";

// 登录函数（极简，无任何缓存干扰）
function doLogin() {
  const val = document.getElementById("pwd").value.trim();
  console.log("输入密码:", val); // 看控制台是否正确
  if (val === ADMIN_PWD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    load();
  } else {
    alert("密码错误");
  }
}

function logout() {
  location.reload();
}

async function load() {
  keyword = document.getElementById("kw").value.trim();
  let q = supabase.from("guestbook").select("*", { count: "exact" });

  if (keyword) {
    q = q.or(`name.ilike.%${keyword}%,content.ilike.%${keyword}%`);
  }

  const { data, error, count } = await q
    .order("is_top", { ascending: false })
    .order("created_at", { ascending: false })
    .range((page - 1) * limit, page * limit - 1);

  document.getElementById("total").textContent = count || 0;
  document.getElementById("hasReply").textContent = data?.filter(i => i.reply)?.length || 0;
  document.getElementById("topCount").textContent = data?.filter(i => i.is_top)?.length || 0;

  if (!data) return;

  let html = "";
  data.forEach(i => {
    const top = i.is_top ? ' class="card top"' : ' class="card"';
    const read = i.is_read ? "【已读】" : "【未读】";
    const rp = i.reply ? "【已回复】" : "";
    const topBtn = i.is_top ?
      `<button class="btn" onclick="setTop(${i.id},false)">取消置顶</button>` :
      `<button class="btn btn-orange" onclick="setTop(${i.id},true)">置顶</button>`;

    let img = "";
    if (i.images?.length) i.images.forEach(u => img += `<img src="${u}">`);

    let reply = "";
    if (i.reply) reply = `<div class="reply-box">${i.reply}</div>`;

    html += `
    <div${top}>
      <input type="checkbox" class="item" value="${i.id}">
      <div class="name">${i.name} ${read} ${rp}</div>
      <div class="time">${new Date(i.created_at).toLocaleString()}</div>
      <div class="content">${i.content}</div>
      ${img ? `<div class="images">${img}</div>` : ""}
      ${reply}
      <div class="act">
        <button class="btn" onclick="openReply(${i.id},'${i.reply||""}')">回复</button>
        ${topBtn}
        <button class="btn btn-red" onclick="del(${i.id})">删除</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
  renderPage(count);
}

function renderPage(total) {
  const max = Math.ceil(total / limit);
  let html = "";
  for (let i = 1; i <= max; i++) {
    html += `<button ${i == page ? 'class="active"' : ""} onclick="go(${i})">${i}</button>`;
  }
  document.getElementById("page").innerHTML = html;
}

function go(p) { page = p; load(); }
function toggleAll() {
  document.querySelectorAll(".item").forEach(i => i.checked = !i.checked);
}

async function setTop(id, v) {
  await supabase.from("guestbook").update({ is_top: v }).eq("id", id);
  load();
}

async function del(id) {
  if (!confirm("确定删除？")) return;
  const { data } = await supabase.from("guestbook").select("images").eq("id", id).single();
  if (data?.images) {
    for (const u of data.images) {
      const p = u.split("/guestbook-bucket/")[1];
      if (p) await supabase.storage.from("guestbook-bucket").remove([p]);
    }
  }
  await supabase.from("guestbook").delete().eq("id", id);
  load();
}

async function batchDel() {
  const arr = Array.from(document.querySelectorAll(".item:checked")).map(i => i.value);
  if (!arr.length) return alert("请选择");
  if (!confirm("删除选中？")) return;
  const { data } = await supabase.from("guestbook").select("images").in("id", arr);
  for (const i of data) {
    if (i.images) for (const u of i.images) {
      const p = u.split("/guestbook-bucket/")[1];
      if (p) await supabase.storage.from("guestbook-bucket").remove([p]);
    }
  }
  await supabase.from("guestbook").delete().in("id", arr);
  load();
}

function openReply(id, txt) {
  document.getElementById("reply_id").value = id;
  document.getElementById("reply_content").value = txt;
  document.getElementById("replyModal").style.display = "flex";
}

async function saveReply() {
  const id = document.getElementById("reply_id").value;
  const reply = document.getElementById("reply_content").value;
  await supabase.from("guestbook").update({
    reply, is_read: true
  }).eq("id", id);
  document.getElementById("replyModal").style.display = "none";
  load();
}
</script>
</body>
</html>
